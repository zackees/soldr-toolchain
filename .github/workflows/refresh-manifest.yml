name: Refresh release manifest

# Nightly refresh of soldr-toolchain's `assets` orphan branch — a
# public JSON catalogue of third-party tool releases served at
# https://raw.githubusercontent.com/zackees/soldr-toolchain/assets/...
#
# The job:
#   1) checks out THREE refs into sibling worktrees:
#        main         -> scripts that do the work
#        assets       -> the catalogue tree (where commits land)
#        zackees/soldr/main -> pinned-version Rust constants
#   2) runs build_manifest.py against the assets checkout
#   3) runs build_asset_index.py to rebuild the sha-bearing flat
#      asset-index.json (consumed by soldr's manifest_lookup.rs)
#   4) commits + pushes if anything changed (no-op when upstream
#      hasn't shipped — write_if_changed gates per-tool files; an
#      empty diff means an empty `git commit` is skipped entirely)
#
# Triggered nightly + manually. Authenticated via `secrets.GITHUB_TOKEN`
# so the API quota is the 5000 req/hour authenticated bucket, not the
# 60 req/hour anonymous one.

on:
  schedule:
    # 06:30 UTC every day — late enough that any upstream release that
    # shipped during US business hours (≤ ~02:00 UTC) is captured in
    # the same calendar day's refresh.
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-manifest
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout soldr-toolchain main (scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          path: main

      - name: Checkout soldr-toolchain assets (catalogue tree)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: assets
          path: assets
          # LFS smudge so the SDK binary is real bytes, not a pointer
          # (build_asset_index.py hashes file content).
          lfs: true

      - name: Checkout zackees/soldr (pinned-version source)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: zackees/soldr
          ref: main
          path: soldr

      - name: Show python version (pre-installed on ubuntu-24.04)
        shell: bash
        run: python3 --version

      - name: Run build_manifest.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          python3 main/scripts/build_manifest.py \
              --output-dir assets \
              --repo-root soldr

      - name: Build asset-index.json (sha-bearing flat index)
        # Consumed by soldr's crates/soldr-cli/src/fetch/manifest_lookup.rs
        # at runtime. Locally-hosted blobs under <tool>/<version>/<platform>/
        # contribute on-disk shas; GitHub releases contribute shas only
        # when the release ships a SHA256SUMS asset.
        shell: bash
        run: |
          set -euo pipefail
          python3 main/scripts/build_asset_index.py \
              --manifest-checkout assets \
              --output assets/asset-index.json \
              --branch assets

      - name: Commit + push if anything changed
        shell: bash
        working-directory: assets
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no upstream changes; assets branch unchanged"
            exit 0
          fi
          git status --short
          git commit -m "manifest: nightly refresh ($(date -u +%Y-%m-%d))"
          git push origin assets
