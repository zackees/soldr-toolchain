name: Refresh release manifest

# Nightly refresh of soldr-toolchain's `assets` orphan branch — a public
# catalogue of third-party tool releases served at
#   https://zackees.github.io/soldr-toolchain/  (GitHub Pages)
#   https://raw.githubusercontent.com/zackees/soldr-toolchain/assets/...
#
# Pipeline:
#   1) build_manifest.py        -> v5 tree in a scratch dir (queries GitHub API)
#   2) build_asset_index.py     -> writes v5 asset-index.json (sha-bearing flat index)
#   3) convert_v5_to_v1.py      -> projects v5 -> manifest.json v1 (Index + Catalogs)
#                                  into the `assets` checkout, alongside the LFS blob
#   4) build_site.py            -> writes index.html landing page
#   5) commit + push if anything changed
#
# Authenticated via secrets.GITHUB_TOKEN so the API quota is the 5000 req/hour
# authenticated bucket, not the 60 req/hour anonymous one.

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-manifest
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout soldr-toolchain main (scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          path: main

      - name: Checkout soldr-toolchain assets (catalogue tree + LFS blob)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: assets
          path: assets
          lfs: true

      - name: Checkout zackees/soldr (pinned-version source)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: zackees/soldr
          ref: main
          path: soldr

      - name: Show python version
        shell: bash
        run: python3 --version

      - name: Build v5 tree into scratch dir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p v5-scratch
          python3 main/scripts/build_manifest.py \
              --output-dir v5-scratch \
              --repo-root soldr

      - name: Build v5 asset-index.json (sha-bearing flat index)
        shell: bash
        run: |
          set -euo pipefail
          python3 main/scripts/build_asset_index.py \
              --manifest-checkout v5-scratch \
              --output v5-scratch/asset-index.json \
              --branch assets

      - name: Convert v5 -> manifest.json v1 (Index + Catalogs)
        shell: bash
        run: |
          set -euo pipefail
          python3 main/scripts/convert_v5_to_v1.py \
              --src v5-scratch \
              --dest assets

      - name: Build index.html landing page
        shell: bash
        run: |
          set -euo pipefail
          python3 main/scripts/build_site.py \
              --src assets \
              --output assets/index.html

      - name: Commit + push if anything changed
        shell: bash
        working-directory: assets
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no upstream changes; assets branch unchanged"
            exit 0
          fi
          git status --short
          git commit -m "manifest: nightly refresh ($(date -u +%Y-%m-%d))"
          git push origin assets
