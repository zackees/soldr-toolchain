name: Refresh release manifest

# Nightly refresh of soldr-toolchain's `assets` orphan branch — a public
# catalogue of third-party tool releases served at
#   https://zackees.github.io/soldr-toolchain/  (GitHub Pages)
#   https://raw.githubusercontent.com/zackees/soldr-toolchain/assets/...
#
# Pipeline:
#   1) build_manifest.py        -> v5 tree in a scratch dir (queries GitHub API)
#   2) build_asset_index.py     -> writes v5 asset-index.json (sha-bearing flat index)
#   3) convert_v5_to_v1.py      -> projects v5 -> manifest.json v1 (Index + Catalogs)
#                                  into the `assets` checkout, alongside the LFS blob
#   4) build_site.py            -> writes index.html landing page
#   5) commit + push if anything changed
#
# Authenticated via secrets.GITHUB_TOKEN so the API quota is the 5000 req/hour
# authenticated bucket, not the 60 req/hour anonymous one.

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-manifest
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout soldr-toolchain main (scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          path: main

      - name: Checkout soldr-toolchain assets (catalogue tree + LFS blob)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: assets
          path: assets
          lfs: true

      - name: Checkout zackees/soldr (pinned-version source)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: zackees/soldr
          ref: main
          path: soldr

      - name: Show python version
        shell: bash
        run: python3 --version

      - name: Build v5 tree into scratch dir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p v5-scratch
          python3 main/scripts/build_manifest.py \
              --output-dir v5-scratch \
              --repo-root soldr

      - name: Build v5 asset-index.json (sha-bearing flat index)
        shell: bash
        run: |
          set -euo pipefail
          python3 main/scripts/build_asset_index.py \
              --manifest-checkout v5-scratch \
              --output v5-scratch/asset-index.json \
              --branch assets

      # Vendored producer for zig. zig isn't on GitHub Releases — it's
      # distributed via ziglang.org/download/index.json — so build_manifest.py
      # can't track it. This producer writes assets/zig/manifest.json
      # directly in v1 format; convert_v5_to_v1.py's
      # _preserve_vendored_entries pass below will re-hash the descriptor
      # in the top-level manifest.json from the on-disk content.
      # See soldr-toolchain#32.
      - name: Refresh assets/zig/manifest.json from ziglang.org
        shell: bash
        run: |
          set -euo pipefail
          python3 main/scripts/build_zig_manifest.py \
              --output-dir assets

      - name: Convert v5 -> manifest.json v1 (Index + Catalogs)
        shell: bash
        run: |
          set -euo pipefail
          python3 main/scripts/convert_v5_to_v1.py \
              --src v5-scratch \
              --dest assets

      - name: Re-build asset-index.json against the v1 tree
        # asset-index.json is the legacy flat (owner, repo, tag, asset,
        # url, sha256) index. After v1 migration its attribution columns
        # must reflect v1 reality (the converter no longer copies the
        # v5-attributed file).
        shell: bash
        run: |
          set -euo pipefail
          python3 main/scripts/build_asset_index.py \
              --manifest-checkout assets \
              --output assets/asset-index.json \
              --branch assets

      - name: Mirror v5 asset-index.json into v1 catalogue.v1.json
        # soldr#988 Phase 1: re-emit the same flat entries under the
        # `catalogue.v1.json` namespace defined in
        # `schemas/catalogue.v1.schema.json`. soldr's Phase 2 resolver
        # reads this file from
        # `https://zackees.github.io/soldr-toolchain/catalogue.v1.json`.
        shell: bash
        run: |
          set -euo pipefail
          python3 main/scripts/build_catalogue_v1.py \
              --asset-index assets/asset-index.json \
              --output assets/catalogue.v1.json

      - name: Refresh Rust nightly version map
        shell: bash
        run: |
          set -euo pipefail
          python3 main/scripts/build_rust_nightly_versions.py \
              --output assets/rust-nightly-versions.v1.json \
              --catalogue assets/catalogue.v1.json \
              --seed 2026-01-18 \
              --seed 2026-03-26 \
              --seed 2026-05-26 \
              --backfill-start 2025-12-06 \
              --max-backfill-checks 8

      - name: Build index.html landing page
        shell: bash
        run: |
          set -euo pipefail
          python3 main/scripts/build_site.py \
              --src assets \
              --output assets/index.html

      - name: Commit + push if anything changed
        shell: bash
        working-directory: assets
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no upstream changes; assets branch unchanged"
            exit 0
          fi
          git status --short
          git commit -m "manifest: nightly refresh ($(date -u +%Y-%m-%d))"
          git push origin assets
