name: catalogue schema

# Validates `examples/catalogue.v1.json` (and any other staged
# catalogue document) against `schemas/catalogue.v1.schema.json`
# on every PR + push. This is the soldr#988 Phase 1 gate that keeps
# producers and the soldr-side runtime resolver in sync.
#
# Schema lives under `schemas/`, the validator under `scripts/`,
# and example documents under `examples/`. Future PRs that change
# the wire shape must bump `schema_version` and update both ends.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install jsonschema (validator dep)
        run: python -m pip install --quiet jsonschema
      - name: Validate examples/catalogue.v1.json
        run: python scripts/validate_catalogue.py examples/catalogue.v1.json
      - name: Schema is itself parseable JSON
        run: python -c "import json,sys; json.load(open('schemas/catalogue.v1.schema.json'))"
      # Re-validate the live catalogue document on the `assets`
      # branch on every PR. Catches the case where a producer change
      # on `main` would have emitted an invalid document, even when
      # the PR diff doesn't touch `examples/`. Skips when `assets`
      # has no catalogue.v1.json yet — the seed lands separately
      # (soldr-toolchain#10).
      - name: Checkout assets branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: assets
          path: assets-checkout
      - name: Validate assets/catalogue.v1.json (if present)
        run: |
          if [ -f assets-checkout/catalogue.v1.json ]; then
            python scripts/validate_catalogue.py assets-checkout/catalogue.v1.json
          else
            echo "assets branch has no catalogue.v1.json yet — skipping"
          fi
